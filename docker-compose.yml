services:
  mcp-searxng-enhanced:
    build: .
    image: mcp-searxng-pdf2md
    container_name: mcp-searxng
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true
    environment:
      # Transport: stdio | streamable-http | both
      - MCP_TRANSPORT=streamable-http
      - MCP_HTTP_HOST=0.0.0.0
      - MCP_HTTP_PORT=8000
      - MCP_HTTP_PATH=/mcp

      # SearXNG endpoint
      - SEARXNG_ENGINE_API_BASE_URL=http://172.17.0.1:11100/search
      - DESIRED_TIMEZONE=Europe/Amsterdam
      - ODS_CONFIG_PATH=/config/ods_config.json

      # Search tuning
      - RETURNED_SCRAPPED_PAGES_NO=8
      - SCRAPPED_PAGES_NO=30
      - PAGE_CONTENT_WORDS_LIMIT=5000
      - CITATION_LINKS=True

      # Category limits
      - MAX_IMAGE_RESULTS=10
      - MAX_VIDEO_RESULTS=10
      - MAX_FILE_RESULTS=5
      - MAX_MAP_RESULTS=5
      - MAX_SOCIAL_RESULTS=5

      # Timeouts
      - TRAFILATURA_TIMEOUT=15
      - SCRAPING_TIMEOUT=20

      # Cache settings
      - CACHE_MAXSIZE=100
      - CACHE_TTL_MINUTES=5
      - CACHE_MAX_AGE_MINUTES=30

      # Rate limiting
      - RATE_LIMIT_REQUESTS_PER_MINUTE=10
      - RATE_LIMIT_TIMEOUT_SECONDS=60

      # Ignore list
      - IGNORED_WEBSITES=
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/mcp')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
